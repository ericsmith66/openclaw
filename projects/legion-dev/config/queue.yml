default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "*"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default
  workers:
    - queues:
        - conductor
        - default
      threads: 4
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1
      heartbeat_interval: 30
      heartbeat_timeout: 120

test:
  <<: *default

production:
  <<: *default
  workers:
    - queues:
        - conductor
        - default
      threads: 4
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1
      heartbeat_interval: 30
      heartbeat_timeout: 120
